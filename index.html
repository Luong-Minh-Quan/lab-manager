<script>
    // 1. Cấu hình kết nối - Đổi tên biến thành _supabase để không trùng với thư viện
    const SUBAPASE_URL = 'https://hhjulrrtmnywrbhtzlqv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_tC-IcNRCd_myv8YaTMeaKg_IbS4XWeI';
    
    // Lưu ý: Tên thư viện là 'supabase', còn biến của chúng ta là '_supabase'
    const _supabase = supabase.createClient(SUBAPASE_URL, SUPABASE_KEY);

    // 2. Hàm xử lý khi nhấn nút "Gửi đăng ký"
    async function handleBooking() {
        const name = document.getElementById('fullName').value;
        const sId = document.getElementById('studentId').value;
        const date = document.getElementById('bookingDate').value;

        // Kiểm tra xem đã nhập đủ chưa
        if (!name || !sId || !date) {
            alert("Vui lòng điền đầy đủ thông tin!");
            return;
        }

        const { data, error } = await _supabase // Sử dụng tên biến mới ở đây
            .from('bookings')
            .insert([
                { 
                    full_name: name, 
                    student_id: sId, 
                    booking_date: date,
                    status: 'pending' 
                }
            ]);

        if (error) {
            console.error("Lỗi chi tiết:", error);
            alert("Lỗi khi đăng ký: " + error.message);
        } else {
            alert("Đăng ký thành công! Dữ liệu đã được gửi về hệ thống.");
            // Xóa dữ liệu cũ trong ô nhập sau khi gửi xong
            document.getElementById('fullName').value = "";
            document.getElementById('studentId').value = "";
            document.getElementById('bookingDate').value = "";
        }
    }
</script>

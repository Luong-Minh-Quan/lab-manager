<div id="registration-form">
    <h2>Đăng ký sử dụng Lab</h2>
    <input type="text" id="fullName" placeholder="Họ và tên">
    <input type="text" id="studentId" placeholder="Mã số sinh viên">
    
    <label>Loại máy:</label>
    <select id="machineName">
        <option value="">-- Chọn máy --</option>
        <option value="Máy CNC 01">Máy CNC 01</option>
        <option value="Máy CNC 02">Máy CNC 02</option>
        <option value="Máy in 3D">Máy in 3D</option>
        <option value="Bộ thực hành PLC">Bộ thực hành PLC</option>
    </select>

    <br><br>
    <label>Ngày:</label>
    <input type="date" id="bookingDate">
    
    <label>Từ:</label>
    <input type="time" id="startTime">
    <label>Đến:</label>
    <input type="time" id="endTime">
    
    <br><br>
    <button onclick="handleBooking()">Gửi đăng ký</button>
</div>
<script>
    const SUPABASE_URL = 'https://hhjulrrtmnywrbhtzlqv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_tC-IcNRCd_myv8YaTMeaKg_IbS4XWeI';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleBooking() {
        const name = document.getElementById('fullName').value;
        const sId = document.getElementById('studentId').value;
        const machine = document.getElementById('machineName').value; // Lấy tên máy
        const date = document.getElementById('bookingDate').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;

        if (!name || !sId || !machine || !date || !start || !end) {
            alert("Vui lòng điền đầy đủ thông tin và chọn máy!");
            return;
        }

        const { data, error } = await _supabase
            .from('bookings')
            .insert([
                { 
                    full_name: name, 
                    student_id: sId,
                    machine_name: machine, // Gửi tên máy vào cột machine_name
                    booking_date: date,
                    start: start,
                    end: end,
                    status: 'pending' 
                }
            ]);

        if (error) {
            console.error("Lỗi:", error);
            alert("Lỗi khi đăng ký: " + error.message);
        } else {
            alert("Đã gửi yêu cầu đăng ký " + machine + " thành công!");
            // Reset form
            document.getElementById('fullName').value = "";
            document.getElementById('studentId').value = "";
            document.getElementById('machineName').value = "";
        }
    }
</script>
